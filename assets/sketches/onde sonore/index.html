<!DOCTYPE html>
<html lang="it">
<head>
    <style>
        body { margin: 0; padding: 10px; background: #ffffff; font-family: monospace; font-size: 11px; color: #000; overflow: hidden; }
        #canvas-box { width: 100%; border-bottom: 1px solid #000; padding-bottom: 10px; }
        #control-panel { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 10px; padding-top: 10px; }
        .ctrl-item { display: flex; flex-direction: column; }
        .ctrl-item label { font-weight: bold; margin-bottom: 4px; text-transform: uppercase; }
        .ctrl-item input, .ctrl-item select { width: 100%; border: 1px solid #000; background: #fff; height: 22px; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.6.0/p5.min.js"></script>
</head>
<body>
    <div id="canvas-box"></div>
    <div id="control-panel">
        <div class="ctrl-item"><label>Freq [<span id="f-lbl">1.0</span>]</label><input type="range" id="f-sld" min="1" max="10" step="0.1" value="1"></div>
        <div class="ctrl-item"><label>Amp [<span id="a-lbl">50</span>]</label><input type="range" id="a-sld" min="10" max="120" step="1" value="50"></div>
        <div class="ctrl-item"><label>Fase [<span id="p-lbl">0</span>&deg;]</label><input type="range" id="p-sld" min="0" max="360" step="1" value="0"></div>
        <div class="ctrl-item">
            <label>Tipo</label>
            <select id="w-type">
                <option value="sin">Sinusoidale</option>
                <option value="comp">Non sinusoidale</option>
                <option value="aper">Aperiodica</option>
            </select>
        </div>
    </div>
    <script src="sketch.js"></script>
</body>
</html>
